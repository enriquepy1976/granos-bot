<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker de Granos — Pereyra</title>
<style>
:root{--verde:#15803d;--verde-bg:#f0fdf4;--rojo:#dc2626;--rojo-bg:#fef2f2;--rojo-borde:#fecaca;--gris:#6b7280;--gris-bg:#f9fafb;--borde:#e5e7eb;--texto:#111827;--texto-sec:#374151;--azul:#1d4ed8;--azul-bg:#eff6ff;--naranja:#d97706;--naranja-bg:#fffbeb;--mono:'IBM Plex Mono','Courier New',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;color:var(--texto);font-size:14px}
header{background:#1a3a1a;color:white;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
header .fecha{font-size:12px;opacity:.7}
.config-section{padding:8px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:white;border-bottom:1px solid var(--borde)}
.config-label{font-size:11px;color:var(--gris);font-weight:600}
.piz-input{display:flex;align-items:center;gap:4px;background:#f9fafb;border:1px solid var(--borde);border-radius:6px;padding:4px 8px}
.piz-input label{font-size:11px;color:var(--gris);white-space:nowrap}
.piz-input input{width:52px;border:none;outline:none;font-size:12px;font-family:var(--mono);color:var(--texto);text-align:right;background:transparent}
.btn-g{background:var(--verde);color:white;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer}
.chips-section{padding:14px 20px 8px}
.chips-title{font-size:11px;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.chips-row{display:flex;gap:10px;flex-wrap:wrap}
.chip-pair{display:flex;flex-direction:column;gap:4px}
.chip-grano-label{font-size:10px;font-weight:700;color:var(--texto-sec);text-transform:uppercase;letter-spacing:.5px}
.chip-cards{display:flex;gap:6px}
.chip{background:white;border:1px solid var(--borde);border-radius:10px;padding:10px 13px;min-width:150px;max-width:190px}
.chip-tipo{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.chip-tipo.disp{color:var(--azul)}.chip-tipo.fut{color:var(--naranja)}
.chip-ref{font-size:10px;color:var(--gris);margin-bottom:3px}
.chip-precio{font-size:18px;font-weight:700;font-family:var(--mono);line-height:1}
.chip-vs{font-size:11px;font-weight:600;margin:2px 0 4px}
.chip-det{font-size:10px;color:var(--gris);line-height:1.5}
.chip-sep{height:1px;background:var(--borde);margin:5px 0}
.chip-garcia{font-size:10px;color:var(--gris)}
.chip-garcia b{color:var(--texto-sec)}
.chip-diff-label{font-size:9px;color:var(--gris)}
.chip-diff{font-size:13px;font-weight:700;font-family:var(--mono);margin-top:1px}
.pos{color:var(--verde)}.neg{color:var(--rojo)}.neutral{color:var(--gris)}
.sin-dato{font-size:10px;color:var(--gris);font-style:italic;padding:3px 0}
.tabla-section{padding:8px 20px 24px}
.grano-bloque{margin-bottom:20px}
.grano-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.grano-nombre{font-size:14px;font-weight:700;color:var(--texto-sec)}
.piz-ref{font-size:11px;color:var(--gris);background:var(--gris-bg);border:1px solid var(--borde);border-radius:4px;padding:2px 7px}
.matba-ref{font-size:11px;color:var(--naranja);background:var(--naranja-bg);border:1px solid #fed7aa;border-radius:4px;padding:2px 7px}
table{width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
thead tr{background:#f8fafc;border-bottom:2px solid var(--borde)}
th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.5px}
th.r{text-align:right}
td{padding:10px 12px;border-bottom:1px solid var(--borde);vertical-align:top}
td.r{text-align:right}
tr:last-child td{border-bottom:none}
tr:hover{background:#fafafa}
tr.mejor td{background:var(--verde-bg)}
.comp-nombre{font-weight:600;color:var(--texto);font-size:13px}
.comp-cond{font-size:11px;color:var(--gris)}
.pos-txt{font-size:12px;color:var(--texto-sec);font-weight:500}
.det-neto-col{text-align:right}
.det-linea{font-size:11px;color:var(--gris)}
.det-linea.base{color:var(--texto-sec);font-weight:500}
.det-sep{height:1px;background:var(--borde);margin:3px 0}
.det-neto{font-size:15px;font-weight:700;font-family:var(--mono)}
.vs-col{text-align:right;min-width:85px}
.vs-val{font-size:12px;font-weight:600;font-family:var(--mono)}
.vs-label{font-size:10px;color:var(--gris)}
.sem{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.sem-g{background:#16a34a}.sem-y{background:#d97706}.sem-r{background:#dc2626}
.badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;display:inline-block}
.badge-disp{background:var(--azul-bg);color:var(--azul)}
.badge-fut{background:var(--naranja-bg);color:var(--naranja)}
.badge-fijar{background:#f3e8ff;color:#7c3aed}
.badge-mejor{background:var(--verde-bg);color:var(--verde);margin-left:4px}
.obs-txt{font-size:11px;color:var(--gris);font-style:italic;margin-top:2px}
.loading{text-align:center;padding:60px 20px;color:var(--gris)}
.error-box{background:var(--rojo-bg);border:1px solid var(--rojo-borde);border-radius:8px;padding:16px;margin:20px;color:var(--rojo);font-size:13px}
footer{padding:10px 20px;text-align:center;font-size:11px;color:var(--gris);border-top:1px solid var(--borde);background:white;margin-top:8px}
</style>
</head>
<body>
<header>
<h1>&#9658; Tracker de Granos</h1>
<span class="fecha" id="hdr-fecha"></span>
</header>
<div class="config-section">
<span class="config-label">Pizarra QQ (USD/t):</span>
<div class="piz-input"><label>Trigo</label><input type="number" id="piz-trigo" step="0.5"></div>
<div class="piz-input"><label>Ma&iacute;z</label><input type="number" id="piz-maiz" step="0.5"></div>
<div class="piz-input"><label>Girasol</label><input type="number" id="piz-girasol" step="0.5"></div>
<div class="piz-input"><label>Soja</label><input type="number" id="piz-soja" step="0.5"></div>
<div class="piz-input"><label>Cebada</label><input type="number" id="piz-cebada" step="0.5"></div>
<button class="btn-g" onclick="guardarPiz()">Guardar</button>
&nbsp;&nbsp;
<span class="config-label">MATBA (USD/t):</span>
<div class="piz-input"><label>Trigo</label><input type="number" id="matba-trigo" step="0.5"></div>
<div class="piz-input"><label>Ma&iacute;z</label><input type="number" id="matba-maiz" step="0.5"></div>
<div class="piz-input"><label>Girasol</label><input type="number" id="matba-girasol" step="0.5"></div>
<div class="piz-input"><label>Soja</label><input type="number" id="matba-soja" step="0.5"></div>
<div class="piz-input"><label>Cebada</label><input type="number" id="matba-cebada" step="0.5"></div>
<button class="btn-g" onclick="guardarMatba()">Guardar</button>
</div>
<div class="chips-section">
<div class="chips-title">Resumen por grano</div>
<div class="chips-row" id="chips-row"><div class="loading">Cargando...</div></div>
</div>
<div class="tabla-section" id="tabla-section"></div>
<footer>Tracker de Granos &mdash; Pereyra &mdash; <span id="ultima-act"></span></footer>
<script>
function normPos(pos){if(!pos&&pos!==0)return 'Disponible';const s=String(pos);const isoMatch=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(isoMatch){const mm=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return mm[parseInt(isoMatch[2])-1]+' '+isoMatch[1]}return s}
const APPS_URL='https://script.google.com/macros/s/AKfycbzqHBjbxC_rfAMkuZ1BwuLB6Oii7Hacbk_U63wYHBiWUO87YH0CqzZ4thoST7OdGCk/exec';
const GARCIA='Guido García';
const GRANOS=['Trigo','Maíz','Girasol','Soja','Cebada'];
const FLETE_DEF=20,FLETE_GIRA=7,BONIF_MG=.15,COM_REF=.01;
let negocios=[],piz={Trigo:210,'Maíz':200,Girasol:360,Soja:314,Cebada:205};
let matba={Trigo:191.6,'Maíz':190,Girasol:0,Soja:324.3,Cebada:215};

const normG=s=>(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/maiz|maíz/,'maiz').replace(/girasol/,'girasol').replace(/trigo/,'trigo').replace(/soja/,'soja').replace(/cebada/,'cebada');
const keyG=g=>{const n=normG(g);if(n.includes('maiz'))return 'Maíz';if(n.includes('girasol'))return 'Girasol';if(n.includes('trigo'))return 'Trigo';if(n.includes('soja'))return 'Soja';if(n.includes('cebada'))return 'Cebada';return g};
const esDisp=pos=>{const p=(pos||'').toLowerCase();return p.includes('disp')||p.includes('abr')||p.includes('may')||p===''||p.includes('inm')};
const posOrd=p=>{const s=(p||'').toLowerCase();if(s.includes('disp')||s.includes('inm'))return 0;const yr=s.match(/20(dd)/);const y=yr?parseInt(yr[1]):26;const mm=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];for(let i=0;i<mm.length;i++)if(s.includes(mm[i]))return y*100+(i+1);if(s.includes('2027'))return 2799;return 9999};

function neto(n){const g=keyG(n.grano);const isG=g==='Girasol';const base=(+n.precio||0)+(+n.prima||0);const bonif=isG?base*BONIF_MG:0;const flete=isG?FLETE_GIRA:(+n.gastos||FLETE_DEF);const merma=(+n.merma||0)>0?base*(+n.merma/100):0;const com=(+n.com||0)>0?base*(+n.com/100):0;const par=+n.par||0;return+(base+bonif-flete-merma-com-par).toFixed(2)}
function netoRef(precio,grano){const isG=keyG(grano)==='Girasol';const base=precio;const bonif=isG?base*BONIF_MG:0;const flete=isG?FLETE_GIRA:FLETE_DEF;return+(base+bonif-flete-base*COM_REF).toFixed(2)}
function sem(ne,ref){if(!ref)return 'neutral';const d=(ne-ref)/Math.abs(ref)*100;return d>=-5?'pos':d>=-10?'neutral':'neg'}
function fmtD(v){if(v===null||v===undefined)return '';const c=v>=0?'pos':'neg';return '<span class="vs-val '+c+'">'+(v>=0?'+':'')+v.toFixed(1)+'</span>'}

function cargarLocal(){try{const p=JSON.parse(localStorage.getItem('tg_piz')||'{}');const m=JSON.parse(localStorage.getItem('tg_matba')||'{}');if(Object.keys(p).length)piz={...piz,...p};if(Object.keys(m).length)matba={...matba,...m}}catch(e){}}
function guardarPiz(){GRANOS.forEach(g=>{const v=parseFloat(document.getElementById('piz-'+normG(g))?.value);if(v>0)piz[g]=v});localStorage.setItem('tg_piz',JSON.stringify(piz));renderTodo();toast('Pizarra guardada ✓')}
function guardarMatba(){GRANOS.forEach(g=>{const v=parseFloat(document.getElementById('matba-'+normG(g))?.value);if(v>0)matba[g]=v});localStorage.setItem('tg_matba',JSON.stringify(matba));renderTodo();toast('MATBA guardado ✓')}
function llenarInputs(){GRANOS.forEach(g=>{const pe=document.getElementById('piz-'+normG(g));const me=document.getElementById('matba-'+normG(g));if(pe)pe.value=piz[g]||'';if(me)me.value=matba[g]||''})}
function toast(msg){let t=document.getElementById('toast-el');if(!t){t=document.createElement('div');t.id='toast-el';t.style.cssText='position:fixed;bottom:24px;right:24px;background:#1a3a1a;color:white;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;transition:opacity .3s';document.body.appendChild(t)}t.textContent=msg;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2500)}

async function cargarNegocios(){document.getElementById('chips-row').innerHTML='<div class="loading">Cargando negocios...</div>';try{const r=await fetch(APPS_URL);const data=await r.json();if(data.ok&&data.negocios?.length){negocios=data.negocios.map(n=>({...n,grano:keyG(n.grano),pos:normPos(n.pos)}));document.getElementById('ultima-act').textContent='Actualizado: '+new Date().toLocaleString('es-AR');renderTodo()}else throw new Error('Sin datos')}catch(e){document.getElementById('chips-row').innerHTML='<div class="error-box">No se pudo conectar con la planilla.<br><small>'+e.message+'</small></div>'}}

function renderChips(){const row=document.getElementById('chips-row');if(!negocios.length){row.innerHTML='<div class="sin-dato">Sin negocios</div>';return}
row.innerHTML=GRANOS.map(grano=>{const ng=negocios.filter(n=>n.grano===grano);if(!ng.length&&!piz[grano])return '';
const disps=ng.filter(n=>esDisp(n.pos));const futs=ng.filter(n=>!esDisp(n.pos));
const gD=disps.filter(n=>n.comp===GARCIA);const gF=futs.filter(n=>n.comp===GARCIA);
const pN=piz[grano]?netoRef(piz[grano],grano):null;const mN=matba[grano]&&matba[grano]>0?netoRef(matba[grano],grano):null;
return '<div class="chip-pair"><div class="chip-grano-label">'+grano+'</div><div class="chip-cards">'+chipCard(grano,disps,gD,pN,'disp','Disponible',piz[grano],'Pizarra')+chipCard(grano,futs,gF,mN,'fut','Futuro/Cosecha',matba[grano],'MATBA')+'</div></div>';
}).filter(Boolean).join('')}

function chipCard(grano,ng,gg,refNeto,tipo,tipoLabel,refPrecio,refLabel){
const isG=grano==='Girasol';
const noG=ng.filter(n=>n.comp!==GARCIA);
const mejN=noG.length?Math.max(...noG.map(n=>neto(n))):null;
const mejNeg=mejN!==null?noG.find(n=>Math.abs(neto(n)-mejN)<.01):null;
const gN=gg.length?Math.max(...gg.map(n=>neto(n))):null;
const gNeg=gN!==null?gg.find(n=>Math.abs(neto(n)-gN)<.01):null;
const refDiff=gN!==null?gN:refNeto;
const refDiffLabel=gN!==null?'García ('+(gNeg?.pos||'disp')+')':refLabel+' -flete -1%';
let c='';
if(mejNeg){const n=mejNeg;const base=(+n.precio||0)+(+n.prima||0);const bonif=isG?+(base*BONIF_MG).toFixed(1):0;const flete=isG?FLETE_GIRA:(+n.gastos||FLETE_DEF);const com=(+n.com||0)>0?+(base*(+n.com/100)).toFixed(1):0;const par=+n.par||0;const merma=(+n.merma||0)>0?+(base*(+n.merma/100)).toFixed(1):0;const ne=neto(n);const dRef=refNeto?+(ne-refNeto).toFixed(1):null;const dG=refDiff?+(ne-refDiff).toFixed(1):null;const semCls=refNeto?sem(ne,refNeto):'neutral';
c='<div class="chip-ref">'+refLabel+': '+(refPrecio?'USD '+refPrecio.toFixed(1):'—')+' → neto '+(refNeto?'USD '+refNeto.toFixed(1):'—')+'</div>'
+'<div style="font-size:10px;color:var(--gris);margin-bottom:2px">Mejor · <b style="color:var(--texto-sec)">'+n.comp+'</b></div>'
+'<div class="chip-precio">USD '+ne.toFixed(1)+'</div>'
+'<div class="chip-det" style="margin:3px 0">'
+(n.precio>0?'<div>Base: USD '+(+n.precio).toFixed(1)+'</div>':'')
+(n.prima>0?'<div>Prima: +USD '+(+n.prima).toFixed(1)+'</div>':'')
+(isG&&bonif>0?'<div>Bonif MG 15%: +USD '+bonif+'</div>':'')
+'<div>Flete: -USD '+flete+'</div>'
+(com>0?'<div>Com '+n.com+'%: -USD '+com+'</div>':'')
+(merma>0?'<div>Merma '+n.merma+'%: -USD '+merma+'</div>':'')
+(par>0?'<div>Paritaria: -USD '+par+'</div>':'')
+'</div>'
+(dRef!==null?'<div class="chip-vs '+semCls+'">'+(dRef>=0?'+':'')+dRef+' vs '+refLabel+'</div>':'')
+'<div class="chip-sep"></div>'
+'<div class="chip-garcia">'+(gN!==null?'García: <b>USD '+gN.toFixed(1)+'</b> · '+(gNeg?.pos||'disp'):'<i>García sin oferta '+tipoLabel.toLowerCase()+'</i>')+'</div>'
+(dG!==null?'<div class="chip-diff-label">vs '+refDiffLabel+'</div><div class="chip-diff '+(dG>=0?'pos':'neg')+'">'+(dG>=0?'+':'')+'USD '+Math.abs(dG).toFixed(1)+'/t</div>':'');
}else if(refNeto){c='<div class="chip-ref">'+refLabel+': '+(refPrecio?'USD '+refPrecio.toFixed(1):'—')+'</div><div class="chip-precio">USD '+refNeto.toFixed(1)+'</div><div class="chip-det" style="margin:3px 0"><div>Neto est. -flete -1%</div></div><div class="chip-sep"></div>'+(gN!==null?'<div class="chip-garcia">García: <b>USD '+gN.toFixed(1)+'</b> · '+(gNeg?.pos||'disp')+'</div><div class="chip-diff-label">vs García</div><div class="chip-diff '+((refNeto-gN)>=0?'pos':'neg')+'">'+(refNeto-gN>=0?'+':'')+'USD '+Math.abs(refNeto-gN).toFixed(1)+'/t</div>':'<div class="sin-dato">Sin ofertas</div>')}
else{c='<div class="sin-dato">Sin datos</div>'}
return '<div class="chip"><div class="chip-tipo '+tipo+'">'+tipoLabel+'</div>'+c+'</div>'}

function renderTabla(){const sec=document.getElementById('tabla-section');if(!negocios.length){sec.innerHTML='';return}
sec.innerHTML=GRANOS.map(grano=>{const ng=negocios.filter(n=>n.grano===grano);if(!ng.length)return '';
const pN=piz[grano]?netoRef(piz[grano],grano):null;const mN=matba[grano]&&matba[grano]>0?netoRef(matba[grano],grano):null;const isG=grano==='Girasol';
const sorted=[...ng].sort((a,b)=>posOrd(a.pos)-posOrd(b.pos));
const mejN=Math.max(...sorted.filter(n=>n.comp!==GARCIA).map(n=>neto(n)),-Infinity);
const filas=sorted.map(n=>{const base=(+n.precio||0)+(+n.prima||0);const bonif=isG?+(base*BONIF_MG).toFixed(1):0;const flete=isG?FLETE_GIRA:(+n.gastos||FLETE_DEF);const com=(+n.com||0)>0?+(base*(+n.com/100)).toFixed(1):0;const par=+n.par||0;const merma=(+n.merma||0)>0?+(base*(+n.merma/100)).toFixed(1):0;const ne=neto(n);const eD=esDisp(n.pos);const refN=eD?pN:mN;const refL=eD?'Pizarra':'MATBA';const dRef=refN?+(ne-refN).toFixed(1):null;const semCls=refN?sem(ne,refN):'neutral';const esMejor=n.comp!==GARCIA&&Math.abs(ne-mejN)<.01;
const condB=eD?'<span class="badge badge-disp">Disponible</span>':n.cond==='A fijar'?'<span class="badge badge-fijar">A fijar</span>':'<span class="badge badge-fut">'+n.pos+'</span>';
return '<tr class="'+(esMejor?'mejor':'')+'"><td><span class="sem sem-'+(semCls==='pos'?'g':semCls==='neutral'?'y':'r')+'"></span><span class="comp-nombre">'+n.comp+'</span>'+(esMejor?'<span class="badge badge-mejor">★ Mejor</span>':'')+'<div class="comp-cond">'+(n.dest||'')+' · '+condB+'</div>'+(n.obs?'<div class="obs-txt">'+n.obs+'</div>':'')+'</td><td><div class="pos-txt">'+(n.pos||'—')+'</div></td><td><div class="det-neto-col"><div class="det-linea base">Base: USD '+(+n.precio).toFixed(1)+(n.prima>0?' + '+n.prima+' prima':'')+'</div>'+(isG&&bonif>0?'<div class="det-linea">+ USD '+bonif+' bonif MG 15%</div>':'')+'<div class="det-linea">− USD '+flete+' flete</div>'+(com>0?'<div class="det-linea">− USD '+com+' com. ('+n.com+'%)</div>':'')+(merma>0?'<div class="det-linea">− USD '+merma+' merma ('+n.merma+'%)</div>':'')+(par>0?'<div class="det-linea">− USD '+par+' paritaria</div>':'')+'<div class="det-sep"></div><div class="det-neto">USD '+ne.toFixed(1)+'/t</div></div></td><td class="vs-col">'+(dRef!==null?fmtDiff(dRef)+'<div class="vs-label">vs '+refL+'</div>':'<span class="vs-label">—</span>')+'</td><td class="vs-col">'+vsGarcia(ne,grano,eD,n)+'</td></tr>'}).join('');
return '<div class="grano-bloque"><div class="grano-header"><span class="grano-nombre">'+grano+(isG?' +15% MG':'')+'</span>'+(piz[grano]?'<span class="piz-ref">Pizarra '+piz[grano].toFixed(1)+'</span>':'')+(matba[grano]&&matba[grano]>0?'<span class="matba-ref">MATBA '+matba[grano].toFixed(1)+'</span>':'')+'</div><table><thead><tr><th>Comprador</th><th>Posición</th><th class="r">Detalle neto</th><th class="r">vs Ref.</th><th class="r">vs García</th></tr></thead><tbody>'+filas+'</tbody></table></div>'
}).filter(Boolean).join('')}

const gn=negocios.filter(n=>n.comp===GARCIA&&n.grano===grano&&esDisp(n.pos)===eD);if(gn.length){const gN=Math.max(...gn.map(n=>neto(n)));const d=+(ne-gN).toFixed(1);return fmtDiff(d)+'<div class="vs-label">vs García</div>'}
const r=eD?(piz[grano]?netoRef(piz[grano],grano):null):(matba[grano]&&matba[grano]>0?netoRef(matba[grano],grano):null);if(!r)return '<span class="vs-label">—</span>';const d=+(ne-r).toFixed(1);return fmtDiff(d)+'<div class="vs-label">vs '+(eD?'Pizarra':'MATBA')+' -flete -1%</div>'}
